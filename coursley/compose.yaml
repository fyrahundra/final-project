services:
  db:
    image: postgres
    restart: always
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: db
      PGTZ: Europe/Stockholm # Should be set to UTC in production, but for local development we can use the local timezone
    volumes:
      - pgdata:/var/lib/postgresql
    command: postgres -c timezone=Europe/Stockholm # Should be set to UTC in production, but for local development we can use the local timezone
  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - 6379:6379
volumes:
  pgdata:
