<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#1e293b"/>

  <!-- Open book - left page -->
  <path d="M10 20 C10 18 12 17 14 17 L30 19 L30 46 L14 44 C12 44 10 43 10 41 Z"
        fill="#f8fafc" stroke="#94a3b8" stroke-width="1"/>

  <!-- Open book - right page -->
  <path d="M54 20 C54 18 52 17 50 17 L34 19 L34 46 L50 44 C52 44 54 43 54 41 Z"
        fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>

  <!-- Book spine -->
  <rect x="30" y="19" width="4" height="27" fill="#64748b"/>

  <!-- Lines on left page -->
  <line x1="15" y1="25" x2="28" y2="25.5" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="15" y1="30" x2="28" y2="30.5" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="15" y1="35" x2="28" y2="35.5" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Lines on right page -->
  <line x1="36" y1="25.5" x2="49" y2="25" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="36" y1="30.5" x2="49" y2="30" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="36" y1="35.5" x2="49" y2="35" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Graduation cap above book -->
  <polygon points="32,8 44,14 32,20 20,14" fill="#6366f1"/>
  <rect x="40" y="14" width="2" height="8" fill="#6366f1"/>
  <circle cx="41" cy="22" r="2.5" fill="#a5b4fc"/>
</svg>
